<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja de Polpas</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }

/* TELA DE BOAS-VINDAS */
#welcome {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  position: relative;
  background: #fff;
  padding: 20px;
  text-align: center;
}

#welcome img {
  max-width: 90%;
  max-height: 50%;
  border-radius: 10px;
  object-fit: contain;
  margin-bottom: 20px;
}

/* BOTÕES INICIAIS */
.button-large {
  background: #ff6600;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  margin: 10px 0;
  transition: transform 0.2s, box-shadow 0.2s;
}
.button-large:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* FORMULÁRIO NOVO CLIENTE */
#formNovoCliente input {
  display: block;
  width: 200px;
  padding: 10px;
  margin: 5px auto;
  border-radius: 8px;
  border: 1px solid #ccc;
}
#formNovoCliente button {
  background: #28a745;
  color: white;
  border: none;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  transition: transform 0.2s;
}
#formNovoCliente button:hover { transform: translateY(-2px); }

/* BOTÃO COMPARTILHAR */
#shareBtn {
  position: absolute;
  bottom: 40px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: #28a745;
  color: white;
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
}

/* LOJA */
.container {
  display: none;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  padding: 10px;
  padding-bottom: 180px; /* espaço para o carrinho fixo */
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: contain;
  border-radius: 8px;
}

.titulo { font-size: 14px; font-weight: bold; }
.preco { color: green; font-size: 14px; }

.qtd-container {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 5px;
}

.qtd-btn {
  background: orange;
  border: none;
  color: white;
  width: 25px;
  height: 25px;
  border-radius: 5px;
  cursor: pointer;
}

/* CARRINHO */
.carrinho {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  padding: 10px;
  box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
  z-index: 10; /* garante que fique sobre os produtos */
}

.btn-finalizar {
  background: green;
  color: white;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- TELA DE BOAS-VINDAS -->
<div id="welcome">
  <img src="https://i.imgur.com/heUiRkb.jpeg" alt="Bem-vindo">
  
  <div id="clienteBtns">
    <button class="button-large" id="novoClienteBtn">Novo Cliente</button>
    <button class="button-large" id="souClienteBtn">Já Sou Cliente</button>
  </div>

  <div id="formNovoCliente" style="display:none; margin-top:20px;">
    <input type="text" id="nomeCliente" placeholder="Seu Nome">
    <input type="text" id="bairroCliente" placeholder="Seu Bairro">
    <input type="text" id="ruaCliente" placeholder="Nome da Rua">
    <input type="text" id="numeroCliente" placeholder="Número da Casa">
    <button id="confirmarCliente">Confirmar</button>
  </div>

  <button id="enterBtn" class="button-large" style="display:none; margin-top:20px;">Ver Produtos</button>
  
  <button id="shareBtn" title="Compartilhar">➤</button>
</div>

<!-- LOJA -->
<div class="container" id="produtos"></div>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
  <div id="lista"></div>
  <div>Total: R$ <span id="total">0.00</span></div>
  <button class="btn-finalizar" id="finalizarBtn">Comprar pelo WhatsApp</button>
</div>

<script>
// PRODUTOS
let produtos = [
  { id: "Acerola", nome: "Polpa de Acerola", preco: 12.00, img: "https://i.imgur.com/8eSR94R.jpeg" },
  { id: "caja", nome: "Polpa de Cajá", preco: 12.00, img: "https://i.imgur.com/9rA9eEV.png" },
  { id: "Caju", nome: "Polpa de Cajú", preco: 12.00, img: "https://i.imgur.com/mHq2Ruu.jpeg" },
  { id: "Abacaxi", nome: "Polpa de Abacaxí", preco: 12.00, img: "https://i.imgur.com/O8cLI2u.jpeg" },
  { id: "Manga", nome: "Polpa de Manga", preco: 12.00, img: "https://i.imgur.com/sJSapCy.jpeg" },
  { id: "Goiaba", nome: "Polpa de Goiaba", preco: 12.00, img: "https://i.imgur.com/1CYEV1I.jpeg" },
  { id: "Tamarindo", nome: "Polpa de Tamarindo", preco: 12.00, img: "https://i.imgur.com/1CYEV1I.jpeg" },
  { id: "Uva", nome: "Polpa de Uva", preco: 15.00, img: "https://i.imgur.com/Rcik0MC.jpeg" },
  { id: "Graviola", nome: "Polpa de Graviola", preco: 15.00, img: "https://i.imgur.com/KM13xoU.jpeg" },
  { id: "Mangaba", nome: "Polpa de Mangaba", preco: 15.00, img: "https://i.imgur.com/UJ5symm.jpeg" },
  { id: "Morango", nome: "Polpa de Morango", preco: 20.00, img: "https://i.imgur.com/YOpeGt9.jpeg" },
  { id: "Maracuja", nome: "Polpa de Maracujá", preco: 22.00, img: "https://i.imgur.com/kKxCPWl.jpeg" }
];

let carrinho = {};
let cliente = { nome: "", bairro: "", rua: "", numero: "" };

// ESCOLHA DO CLIENTE
document.getElementById("novoClienteBtn").addEventListener("click", () => {
  document.getElementById("formNovoCliente").style.display = "block";
  document.getElementById("clienteBtns").style.display = "none";
});

document.getElementById("souClienteBtn").addEventListener("click", () => {
  document.getElementById("enterBtn").style.display = "block";
  document.getElementById("clienteBtns").style.display = "none";
});

// CONFIRMAR NOVO CLIENTE
document.getElementById("confirmarCliente").addEventListener("click", () => {
  const nome = document.getElementById("nomeCliente").value.trim();
  const bairro = document.getElementById("bairroCliente").value.trim();
  const rua = document.getElementById("ruaCliente").value.trim();
  const numero = document.getElementById("numeroCliente").value.trim();

  if (!nome || !bairro || !rua || !numero) {
    alert("Preencha todos os campos!");
    return;
  }

  cliente.nome = nome;
  cliente.bairro = bairro;
  cliente.rua = rua;
  cliente.numero = numero;

  document.getElementById("formNovoCliente").style.display = "none";
  document.getElementById("enterBtn").style.display = "block";
});

// BOTÃO “VER PRODUTOS”
document.getElementById("enterBtn").addEventListener("click", () => {
  document.getElementById("welcome").style.display = "none";
  renderProdutos();
});

// BOTÃO COMPARTILHAR
document.getElementById("shareBtn").addEventListener("click", async () => {
  const url = "https://meusaplicativoscom-pixel.github.io/PolpaDoBigode/";
  const title = "Confira esse site!";
  if (navigator.share) {
    try { await navigator.share({ title, url }); } catch (err) { console.log(err); }
  } else {
    try { await navigator.clipboard.writeText(url); alert("Link copiado!"); }
    catch { prompt("Copie o link:", url); }
  }
});

// RENDERIZA PRODUTOS
function renderProdutos() {
  let container = document.getElementById("produtos");
  container.innerHTML = "";
  container.style.display = "grid";
  produtos.forEach(p => {
    carrinho[p.id] = { ...p, qtd: 0 };
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="titulo">${p.nome}</div>
        <div class="preco">R$ ${p.preco.toFixed(2)}</div>
        <div class="qtd-container">
          <button class="qtd-btn" onclick="alterarQtd('${p.id}', -1)">-</button>
          <div id="qtd-${p.id}">0</div>
          <button class="qtd-btn" onclick="alterarQtd('${p.id}', 1)">+</button>
        </div>
      </div>
    `;
  });
  document.getElementById("carrinho").style.display = "block";
}

// ALTERAR QUANTIDADE
function alterarQtd(id, delta) {
  let p = carrinho[id];
  p.qtd += delta;
  if (p.qtd < 0) p.qtd = 0;
  document.getElementById("qtd-" + id).innerText = p.qtd;
  atualizarCarrinho();
}

// ATUALIZA CARRINHO
function atualizarCarrinho() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  let total = 0;
  for (let id in carrinho) {
    let p = carrinho[id];
    if (p.qtd > 0) {
      let subtotal = p.qtd * p.preco;
      total += subtotal;
      lista.innerHTML += `<div>${p.nome} x${p.qtd} = R$ ${subtotal.toFixed(2)}</div>`;
    }
  }
  document.getElementById("total").innerText = total.toFixed(2);
}

// FINALIZAR COMPRA
document.getElementById("finalizarBtn").addEventListener("click", () => {
  let mensagem = "Olá, quero comprar:%0A";
  let total = 0;
  for (let id in carrinho) {
    let p = carrinho[id];
    if (p.qtd > 0) {
      let subtotal = p.qtd * p.preco;
      total += subtotal;
      mensagem += `- ${p.nome} x${p.qtd} = R$ ${subtotal.toFixed(2)}%0A`;
    }
  }
  if (total === 0) { alert("Carrinho vazio!"); return; }
  mensagem += `%0ATotal: R$ ${total.toFixed(2)}`;

  if (cliente.nome && cliente.bairro) {
    mensagem += `%0ANome: ${cliente.nome}`;
    mensagem += `%0ABairro: ${cliente.bairro}`;
    mensagem += `%0ARua: ${cliente.rua}`;
    mensagem += `%0ANúmero: ${cliente.numero}`;
  }

  let telefone = "5584988656362";
  let url = `https://api.whatsapp.com/send?phone=${telefone}&text=${mensagem}`;
  window.open(url, "_blank");
});
</script>
</body>
</html>
